name: Rebuild on yt-dlp Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest yt-dlp release
        id: yt-dlp
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check if rebuild needed
        id: check
        run: |
          STORED=$(cat .yt-dlp-version 2>/dev/null || echo "")
          if [ "$STORED" != "${{ steps.yt-dlp.outputs.version }}" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            ghcr.io/${{ github.repository_owner }}/yt-dlp-bot:latest
            ghcr.io/${{ github.repository_owner }}/yt-dlp-bot:yt-dlp-${{ steps.yt-dlp.outputs.version }}

      - name: Update version file
        if: steps.check.outputs.rebuild == 'true'
        run: |
          echo "${{ steps.yt-dlp.outputs.version }}" > .yt-dlp-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .yt-dlp-version
          git commit -m "Update yt-dlp version to ${{ steps.yt-dlp.outputs.version }}"
          git push